services:
  backend:
    build: ./backend
    environment:
      CORS_ORIGINS: '["http://localhost:8080"]'
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "8080:3000"
    depends_on:
      - backend
